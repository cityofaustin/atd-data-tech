name: "Bug Report"
description: "Document reproducible bugs in apps or processes."
title: "[Bug] "
labels:
  - "Type: Bug Report"
  - "[Team] :rotating_light: MISSING"
  - "[Workgroup] :rotating_light: MISSING"
type: Task
body:
  - type: textarea
    id: description
    attributes:
      label: "Description"
      placeholder: "Include steps to reproduce, expected vs. actual behavior, and browser/device when relevant."
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: "Severity"
      options:
        - "Low"
        - "Medium"
        - "High"
        - "Critical"
